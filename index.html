<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Uploader - GitHub Edition</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <i class="fas fa-cloud-upload-alt"></i>
                <span>Image Uploader</span>
            </div>
            <div class="stats">
                <div class="stat">
                    <span class="count" id="imageCount">0</span>
                    <span class="label">Images</span>
                </div>
                <div class="stat">
                    <span class="count" id="storageUsed">0 MB</span>
                    <span class="label">Used</span>
                </div>
            </div>
        </header>

        <main>
            <div class="upload-section">
                <div class="upload-area" id="uploadArea">
                    <i class="fas fa-images upload-icon"></i>
                    <h3>Drag & Drop images here</span></h3>
                    <p>or</p>
                    <button class="browse-btn" id="browseBtn">
                        <i class="fas fa-folder-open"></i> Browse Files
                    </button>
                    <input type="file" id="fileInput" accept="image/*" multiple>
                    <p class="file-info" id="fileInfo"></p>
                </div>
                <div class="upload-progress" id="uploadProgress" style="display: none;">
                    <div class="progress-bar">
                        <div class="progress" id="progress"></div>
                    </div>
                    <p class="progress-text" id="progressText">Uploading...</p>
                </div>
            </div>

            <div class="gallery-section">
                <h2>Uploaded Images</h2>
                <div class="gallery" id="gallery">
                    <!-- Gallery images will appear here -->
                </div>
            </div>
        </main>
    </div>

    <dialog class="image-dialog" id="imageDialog">
        <div class="dialog-content">
            <button class="close-dialog" id="closeDialog">&times;</button>
            <img src="" alt="Uploaded Image" id="dialogImage">
            <div class="dialog-info">
                <div class="info-item">
                    <span class="label">File Name:</span>
                    <span class="value" id="dialogFileName"></span>
                </div>
                <div class="info-item">
                    <span class="label">Size:</span>
                    <span class="value" id="dialogFileSize"></span>
                </div>
                <div class="info-item">
                    <span class="label">Uploaded:</span>
                    <span class="value" id="dialogUploaded"></span>
                </div>
                <div class="info-item">
                    <span class="label">Direct Link:</span>
                    <input type="text" id="dialogLink" readonly>
                    <button class="copy-btn" id="copyLink" title="Copy to clipboard">
                        <i class="fas fa-copy"></i>
                    </button>
                </div>
            </div>
        </div>
    </dialog>

    <script src="script.js"></script>
</body>
</html>
